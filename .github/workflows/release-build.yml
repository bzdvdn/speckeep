name: release-build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run go vet
        run: go vet ./...

      - name: Verify gofmt
        shell: bash
        run: |
          set -euo pipefail
          files="$(git ls-files '*.go')"
          test -n "${files}"
          unformatted="$(gofmt -l ${files})"
          if [[ -n "${unformatted}" ]]; then
            echo "gofmt required for:"
            echo "${unformatted}"
            exit 1
          fi

      - name: Run test suite
        run: go test ./...

  build:
    name: build-${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: test

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive_ext: tar.gz
            binary_ext: ""
          - goos: linux
            goarch: arm64
            archive_ext: tar.gz
            binary_ext: ""
          - goos: darwin
            goarch: amd64
            archive_ext: tar.gz
            binary_ext: ""
          - goos: darwin
            goarch: arm64
            archive_ext: tar.gz
            binary_ext: ""
          - goos: windows
            goarch: amd64
            archive_ext: zip
            binary_ext: .exe
          - goos: windows
            goarch: arm64
            archive_ext: zip
            binary_ext: .exe

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build speckeep
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          output="dist/speckeep${{ matrix.binary_ext }}"
          go build -trimpath -ldflags "-X speckeep/src/internal/cli.Version=${GITHUB_REF_NAME}" -o "${output}" ./src/cmd/speckeep

      - name: Package tar archive
        if: matrix.goos != 'windows'
        run: |
          tag="${GITHUB_REF_NAME}"
          asset="speckeep_${tag}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz"
          tar -C dist -czf "dist/${asset}" "speckeep"

      - name: Package Windows archive
        if: matrix.goos == 'windows'
        run: |
          tag="${GITHUB_REF_NAME}"
          asset="speckeep_${tag}_${{ matrix.goos }}_${{ matrix.goarch }}.zip"
          cd dist
          zip "${asset}" "speckeep.exe"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: speckeep-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/speckeep_${{ github.ref_name }}_${{ matrix.goos }}_${{ matrix.goarch }}.${{ matrix.archive_ext }}
          if-no-files-found: error

  checksums:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Collect release files
        run: |
          mkdir -p release-assets
          find dist -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} release-assets/ \;

      - name: Generate sha256sum.txt
        run: |
          cd release-assets
          ls -1 | sort | xargs -I{} sha256sum "{}" > sha256sum.txt

      - name: Upload checksums artifact
        uses: actions/upload-artifact@v4
        with:
          name: speckeep-checksums
          path: release-assets/sha256sum.txt
          if-no-files-found: error
