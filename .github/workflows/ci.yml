name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify gofmt
        shell: bash
        run: |
          set -euo pipefail
          files="$(git ls-files '*.go')"
          test -n "${files}"
          unformatted="$(gofmt -l ${files})"
          if [[ -n "${unformatted}" ]]; then
            echo "gofmt required for:"
            echo "${unformatted}"
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Run test suite
        run: go test ./...
